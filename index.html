<script>

      { label: "Brake Pad Thickness — Rear", type: "input", placeholder: "mm" },
      { label: "Rotor Disc Thickness — Front", type: "input", placeholder: "mm" },
      { label: "Rotor Disc Thickness — Rear", type: "input", placeholder: "mm" }
    ]
  },
  {
    title: "Wheels",
    icon: "🚲",
    items: [
      { label: "No Lateral Play", type: "check" },
      { label: "Tyres Pressure (PSI)", type: "dual", labels: ["Front", "Rear"] },
      { label: "Tyres Beads Seated", type: "check" },
      { label: "Valves Tightened", type: "check" },
      { label: "Lateral True Within 1-2mm", type: "check" },
      { label: "Tyres Direction", type: "check" }
    ]
  },
  {
    title: "Others",
    icon: "🔧",
    items: [
      { label: "Headset Play", type: "check" },
      { label: "Cables Crimped", type: "check" },
      { label: "Handle Bar Alignment", type: "check" },
      { label: "Saddle Alignment", type: "check" }
    ]
  }
];

let uid = 0;

function render() {
  const grid = document.getElementById('checklistGrid');
  grid.innerHTML = '';
  uid = 0;

  sections.forEach(section => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <div class="card-header">
        <span class="icon">${section.icon}</span>
        ${section.title}
      </div>
      <div class="card-body"></div>
    `;

    grid.appendChild(card);

    const body = card.querySelector('.card-body');

    section.items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'check-row';
      uid++;

      if (item.type === 'check') {
        row.innerHTML = `
          <input
            class="chk tracker"
            type="checkbox"
            id="chk_${uid}"
            onchange="updateProgress()"
          />
          <label class="row-label" for="chk_${uid}">
            ${item.label}
          </label>
        `;
      }

      if (item.type === 'input') {
        row.innerHTML = `
          <input
            class="chk tracker"
            type="checkbox"
            id="chk_${uid}"
            onchange="updateProgress()"
          />
          <label class="row-label" for="chk_${uid}">
            ${item.label}
          </label>
          <input
            class="row-input"
            type="text"
            placeholder="${item.placeholder || ''}"
          />
        `;
      }

      if (item.type === 'dual') {
        const labels = item.labels || ['L', 'R'];

        row.innerHTML = `
          <input
            class="chk tracker"
            type="checkbox"
            id="chk_${uid}"
            onchange="updateProgress()"
          />
          <label class="row-label" for="chk_${uid}">
            ${item.label}
          </label>

          <div class="dual-inputs">
            <span class="dual-label">${labels[0]}</span>
            <input
              class="row-input"
              type="text"
              placeholder="PSI"
              style="width:60px"
            />

            <span class="dual-label">${labels[1]}</span>
            <input
              class="row-input"
              type="text"
              placeholder="PSI"
              style="width:60px"
            />
          </div>
        `;
      }

      body.appendChild(row);
    });
  });

  document.getElementById('inspDate').valueAsDate = new Date();
  updateProgress();
}

function updateProgress() {
  const all = document.querySelectorAll('.tracker');
  const checked = document.querySelectorAll('.tracker:checked');

  const percentage = all.length
    ? Math.round((checked.length / all.length) * 100)
    : 0;

  document.getElementById('progressFill').style.width = percentage + '%';
  document.getElementById('progressText').textContent =
    `${checked.length} / ${all.length}`;
}

function setLevel(level, button) {
  document
    .querySelectorAll('.level-btn')
    .forEach(item => item.classList.remove('active'));

  button.classList.add('active');
}

async function savePDF() {
  const button = document.querySelector('.btn-save');
  const pdfContent = document.getElementById('pdfContent');

  button.textContent = '⏳ Generating…';
  button.disabled = true;

  document.body.classList.add('pdf-export');

  try {
    if (document.fonts && document.fonts.ready) {
      await document.fonts.ready;
    }

    await new Promise(resolve => {
      requestAnimationFrame(() => {
        requestAnimationFrame(resolve);
      });
    });

    const canvas = await html2canvas(pdfContent, {
      scale: 2,
      useCORS: true,
      allowTaint: false,
      backgroundColor: '#0f0f0f',
      logging: false,
      scrollX: 0,
      scrollY: 0,
      windowWidth: pdfContent.scrollWidth,
      windowHeight: pdfContent.scrollHeight
    });

    const { jsPDF } = window.jspdf;

    const pdf = new jsPDF({
      orientation: 'landscape',
      unit: 'mm',
      format: 'a4',
      compress: true
    });

    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();

    const margin = 5;
    const usableWidth = pageWidth - margin * 2;
    const usableHeight = pageHeight - margin * 2;

    const widthRatio = usableWidth / canvas.width;
    const heightRatio = usableHeight / canvas.height;
    const scaleRatio = Math.min(widthRatio, heightRatio);

    const imageWidth = canvas.width * scaleRatio;
    const imageHeight = canvas.height * scaleRatio;

    const x = (pageWidth - imageWidth) / 2;
    const y = (pageHeight - imageHeight) / 2;

    const imageData = canvas.toDataURL('image/jpeg', 0.95);

    pdf.addImage(
      imageData,
      'JPEG',
      x,
      y,
      imageWidth,
      imageHeight,
      undefined,
      'FAST'
    );

    const clientName =
      document.getElementById('clientName').value.trim() || 'checklist';

    const inspectionDate =
      document.getElementById('inspDate').value || 'today';

    const safeClientName = clientName.replace(/[<>:"/\\|?*]/g, '_');

    pdf.save(
      `BikeChecklist_${safeClientName}_${inspectionDate}.pdf`
    );
  } catch (error) {
    console.error(error);
    alert('PDF generation failed: ' + error.message);
  } finally {
    document.body.classList.remove('pdf-export');
    button.textContent = '⬇ Save as PDF';
    button.disabled = false;
  }
}

render();
</script>

</body>
</html>
